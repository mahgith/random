global_configuration:
  model_name: &model_name "volume-forecast-prophet"

infra:
  project_id: forecast-sales-poc
  location: europe-west9
  bucket_name: volume-forecast-demo

params_extract_data_from_bq:
  dataset: volume_forecast_per_day
  table_id: volumes_per_day

params_split_time_series:
  validation_gate_days_data: 30

params_train_prophet_model:
  hyperparameter_grid:
    changepoint_prior_scale:
      - 0.01
      - 0.05
      - 0.1
      - 0.5
    seasonality_prior_scale:
      - 1.0
      - 5.0
      - 10.0
    seasonality_mode:
      - additive
      - multiplicative
    daily_seasonality:
      - false
    weekly_seasonality:
      - true
      - 5
      - 10
    yearly_seasonality:
      - false
  experiment_name: prophet-tuning-experiment
  run_prefix: tuning-run  

params_evaluation_model:
  max_allowed_mape: 0.12
  max_allowed_wape: 0.12
  max_allowed_mae: 10
  max_allowed_rmse: 14
  max_allowed_abs_bias: 2
  mase_seasonality_period: 7

params_gate_champion_vs_challenger:
  model_display_name: *model_name
  champion_label_env: dev
  champion_label_role: champion
  delta_rel: 0.03
  delta_abs: 0.005

params_register_prophet_model:
  model_display_name: *model_name
  serving_image_uri: europe-west9-docker.pkg.dev/forecast-sales-poc/forecast-sales-images/prophet:latest
  champion_label_env: dev
  champion_label_role: champion
  archived_label_role: archived